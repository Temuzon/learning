<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicoin.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Systux</title>
</head>
<body>

    <!-- ==================== DASHBOARD ÚNICO ==================== -->
    <section class="dashboard">

        <!-- NAVBAR SUPERIOR -->
        <div class="navbar-dashboard">
            <div class="user-data">
                <div class="welcome-text">
                    <span>Bienvenido, </span>
                    <span class="user-name">Luzyfor</span>
                </div>
                <div class="cont-user-profile-picture">
                    <img src="https://statux.netlify.app/Statux-logo(SVG).svg"
                    alt="Avatar"
                    loading="eager">
                </div>
            </div>
        </div>

        <!-- MAIN LAYOUT: contenido + sidebar -->
        <div class="main-layout">

            <!-- CONTENIDO CENTRAL -->
            <div class="dashboard-content">

                <!-- EMPTY STATE (visible por defecto) -->
                <div id="emptyState" class="empty-state section-visible">
                    <span>Bienvenido, <strong>Luzyfor</strong></span>
                    <span style="font-size:1.2rem;color:var(--gray7);">Selecciona una sección para comenzar</span>
                    <span class="wave" style="font-size:2.5rem;">👋🏿</span>
                </div>

                <!-- SECCIÓN ACTIVIDAD -->
                <div id="actividad" class="actividad section-hidden">
                    <div class="title-content">Actividad</div>
                    <div class="content-actividad">
                        <!-- Card: Última actividad -->
                        <div class="activity-card last">
                            <div class="card-info">
                                <img src="https://statux.netlify.app/Statux-logo(SVG).svg" alt="Systux Hábitos">
                                <div class="text">
                                    <span class="label">Última actividad</span>
                                    <span class="systux-name">Systux Hábitos</span>
                                </div>
                            </div>
                            <button class="enteractividad" onclick="alert('Abriendo Systux Hábitos...')">Entrar</button>
                        </div>
                        <!-- Card: Racha en peligro -->
                        <div class="activity-card warning">
                            <div class="card-info">
                                <img src="https://statux.netlify.app/Statux-logo(SVG).svg" alt="Disciplina 30D">
                                <div class="text">
                                    <span class="label danger">⚠ Racha en riesgo</span>
                                    <span class="systux-name">Calistenia 2.0</span>
                                </div>
                            </div>
                            <button class="enteractividad" onclick="alert('Continuando racha...')">Continuar</button>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN CARRUSEL -->
                <div id="carrusel" class="carrusel section-hidden">
                    <div class="title-content">Explorar Systux</div>
                    <div class="carrusel-empty" id="carruselEmpty">
                        <p>Aún no has desbloqueado ningún contenido.</p>
                        <span>Desbloquea cards en Ebootux, Plantitux o Movitux para verlas aquí.</span>
                    </div>
                    <div class="carrusel-wrapper">
                        <!-- Botón izquierdo -->
                        <button class="carousel-btn left" id="carouselLeft" aria-label="Anterior">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M8.12 9.29L12 13.17l3.88-3.88c.39-.39 1.02-.39 1.41 0 .39.39.39 1.02 0 1.41l-4.59 4.59c-.39.39-1.02.39-1.41 0L6.7 10.7c-.39-.39-.39-1.02 0-1.41.39-.38 1.03-.39 1.42 0z'/%3E%3C/svg%3E"
                            alt="‹">
                        </button>
                        <!-- Track del carrusel -->
                        <div class="carrusel-track" id="track">
                            <!-- Las cards se generan dinámicamente desde localStorage -->
                        </div>
                        <!-- Botón derecho -->
                        <button class="carousel-btn right" id="carouselRight" aria-label="Siguiente">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M8.12 9.29L12 13.17l3.88-3.88c.39-.39 1.02-.39 1.41 0 .39.39.39 1.02 0 1.41l-4.59 4.59c-.39.39-1.02.39-1.41 0L6.7 10.7c-.39-.39-.39-1.02 0-1.41.39-.38 1.03-.39 1.42 0z'/%3E%3C/svg%3E"
                            alt="›">
                        </button>
                    </div>
                </div>
            </div>

            <!-- SIDEBAR DERECHA -->
            <div class="icontent">
                <button class="icon-nav" data-section="actividad" aria-label="Actividad">
                    <img src="https://statux.netlify.app/usuario.svg" alt="Actividad">
                    <span class="tooltip">Actividad</span>
                </button>
                <button class="icon-nav" data-section="carrusel" aria-label="Carrusel">
                    <img src="https://statux.netlify.app/usuario.svg" alt="Carrusel">
                    <span class="tooltip">Carrusel</span>
                </button>
            </div>

        </div>
    </section>

    
</body>
</html>
