<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicoin.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Systux</title>
</head>
<body>
<section class="dashboard">

    <!-- NAVBAR SUPERIOR -->
    <div class="navbar-dashboard">
        <div class="user-data">
            <div class="welcome-text">
                <span>Bienvenido, </span>
                <span class="user-name">Usuario</span>
            </div>
            <div class="cont-user-profile-picture">
                <img src="https://statux.netlify.app/Statux-logo(SVG).svg"
                alt="Avatar"
                loading="eager">
            </div>
        </div>
    </div>

    <!-- MAIN LAYOUT: solo contenido, sin sidebar -->
    <div class="main-layout">
        <div class="dashboard-content">

            <!-- BLOQUES DE NAVEGACIÓN (reemplazan al sidebar) -->
            <div class="dashboard-nav-pills">
                <button class="dash-pill" data-section="carrusel" aria-label="Mis Systux">
                    <span class="dash-pill-icon">📦</span>
                    <span class="dash-pill-label">Mis Systux</span>
                </button>
                <button class="dash-pill" data-section="actividad" aria-label="Actividad">
                    <span class="dash-pill-icon">⚡</span>
                    <span class="dash-pill-label">Actividad</span>
                </button>
            </div>

            <!-- EMPTY STATE (visible por defecto) -->
            <div id="emptyState" class="empty-state section-visible">
                <span>Selecciona una sección para comenzar</span>
            </div>

            <!-- SECCIÓN ACTIVIDAD -->
            <div id="actividad" class="actividad section-hidden">
                <div class="title-content">Actividad</div>
                <div class="content-actividad" id="actividadContent">
                    <!-- Se llenará dinámicamente en el futuro -->
                    <div class="dashboard-empty-msg">
                        <span>Aún no tienes actividad registrada.</span>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN CARRUSEL -->
            <div id="carrusel" class="carrusel section-hidden">
                <div class="title-content">Mis Systux</div>
                <div class="carrusel-wrapper">
                    <button class="carousel-btn left" id="carouselLeft" aria-label="Anterior">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M8.12 9.29L12 13.17l3.88-3.88c.39-.39 1.02-.39 1.41 0 .39.39.39 1.02 0 1.41l-4.59 4.59c-.39.39-1.02.39-1.41 0L6.7 10.7c-.39-.39-.39-1.02 0-1.41.39-.38 1.03-.39 1.42 0z'/%3E%3C/svg%3E"
                        alt="‹">
                    </button>
                    <div class="carrusel-track" id="track">
                        <!-- Cards dinámicas desde localStorage -->
                    </div>
                    <button class="carousel-btn right" id="carouselRight" aria-label="Siguiente">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3E%3Cpath d='M8.12 9.29L12 13.17l3.88-3.88c.39-.39 1.02-.39 1.41 0 .39.39.39 1.02 0 1.41l-4.59 4.59c-.39.39-1.02.39-1.41 0L6.7 10.7c-.39-.39-.39-1.02 0-1.41.39-.38 1.03-.39 1.42 0z'/%3E%3C/svg%3E"
                        alt="›">
                    </button>
                </div>
                <div class="carrusel-empty" id="carruselEmpty" style="display:none;">
                    <p>Aún no has desbloqueado ningún contenido.</p>
                    <span>Desbloquea cards en Ebootux, Plantitux o Movitux para verlas aquí.</span>
                </div>
            </div>

        </div>
    </div>

</section>
</body>
</html>
